commands:
  install: go mod download
  build: go build -o /tmp/droid-proxy-mission ./cmd/droid-proxy
  test: GOMAXPROCS=2 go test -p=1 ./...
  test_race: GOMAXPROCS=2 go test -race -p=1 ./...
  vet: GOMAXPROCS=2 go vet ./...
  lint: GOMAXPROCS=2 go vet ./... && test -z "$(gofmt -l .)"

services:
  droid-proxy:
    start: echo 'starting droid-proxy on 127.0.0.1:8787' && DEEPSEEK_API_KEY=dummy-local-validation-key go run ./cmd/droid-proxy --config config.example.yaml
    stop: sh -c 'pids=$(lsof -ti :8787); if [ -n "$pids" ]; then kill $pids; fi'
    healthcheck: curl -sf http://127.0.0.1:8787/health
    port: 8787
    depends_on: []
