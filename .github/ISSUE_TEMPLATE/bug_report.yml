name: Bug report
description: Report a problem with droid-proxy
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include real
        API keys, OAuth tokens, or other secrets in logs or config you paste here.
        For security vulnerabilities, use a private advisory instead — see
        [SECURITY.md](https://github.com/trevoraspencer/droid-proxy/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the behavior.
      placeholder: |
        1. Configure '...'
        2. Run `droid-proxy --config ...`
        3. Send request '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant config / provider
      description: Which provider and config settings are involved? Redact secrets.
      render: yaml
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `droid-proxy --version` or the commit SHA you built from.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and Go version
      description: e.g. macOS 14 / Linux, and `go version` if built from source.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output. Secrets are redacted by the proxy, but double-check before pasting.
      render: shell
    validations:
      required: false
