name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (gofmt + vet)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module integrity
        run: go mod verify
        timeout-minutes: 5
      - name: Lint
        run: make lint
        timeout-minutes: 5

  test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: make build
        timeout-minutes: 5
      - name: Test
        run: make test
        timeout-minutes: 5
      - name: Test (race detector)
        run: make test-race
        timeout-minutes: 5

  audit:
    name: Release, docs & legal audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
        timeout-minutes: 5
      - name: Legal & licensing audit
        run: make legal-audit
        timeout-minutes: 5
      - name: Documentation audit
        run: make docs-audit
        timeout-minutes: 5
      - name: Release hardening audit
        run: make release-audit
        timeout-minutes: 5

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks can scan every commit.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          ver=8.24.2
          sha=fa0500f6b7e41d28791ebc680f5dd9899cd42b58629218a5f041efa899151a8e
          mkdir -p "$RUNNER_TEMP/bin"
          archive="$RUNNER_TEMP/gitleaks.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${ver}/gitleaks_${ver}_linux_x64.tar.gz"
          echo "$sha  $archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP/bin" gitleaks
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
        timeout-minutes: 5
      - name: Audit secrets
        run: make audit-secrets
        timeout-minutes: 5
