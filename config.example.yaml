# droid-proxy example configuration.
#
# Setup:
#   cp config.example.yaml config.yaml
#   cp .env.local.example .env.local   # add API keys
#   set -a && source .env.local && set +a
#   ./droid-proxy start --config config.yaml
#
# See docs/CLI.md and docs/README.md for full documentation.

listen:
  host: 127.0.0.1
  port: 8787

server:
  request_body_max_bytes: 10485760
  read_header_timeout: 30s
  read_timeout: 60s
  write_timeout: 600s
  idle_timeout: 120s
  shutdown_timeout: 5s

# Optional: require Droid (or any client) to send a matching API key in
# Authorization. When disabled, localhost is trusted by default.
client_auth:
  enabled: false
  # api_keys:
  #   - "${DROID_PROXY_API_KEY}"

logging:
  level: info
  format: text
  redact: true
  trace_requests: false

reasoning_cache:
  enabled: true
  max_entries: 1024
  ttl: 30m

upstream:
  http_timeout: 600s
  stream_keep_alive: 15s
  response_body_max_bytes: 104857600
  error_body_max_bytes: 1048576

oauth:
  auth_dir: "~/.droid-proxy/auth"
  codex_callback_host: localhost
  codex_callback_port: 1455
  xai_callback_host: 127.0.0.1
  xai_callback_port: 56121
  # Load balancing for Codex OAuth multi-account pooling.
  # Does not apply to xAI OAuth (single-account only).
  # All fields have defaults; omit the block or individual fields to use defaults.
  # load_balancing:
  #   strategy: sticky                 # sticky (default), round-robin, fill-first, least-connections, random
  #   quota_soft_cap_percent: 80       # prefer accounts below this used_percent (0 = disable)
  #   affinity_path: ~/.droid-proxy/conversation_affinity.json
  #   max_failovers: 2                 # additional alternate-account attempts (0 = single attempt only)
  #   rate_limit_cooldown: 60s         # cooldown after 429 when no Retry-After / exhausted-window reset
  #   error_cooldown: 30s              # cooldown after 5xx or transport timeout

models:
  # Example: DeepSeek via Factory's generic-chat-completion-api mode.
  - alias: deepseek-v4-flash
    display_name: "DeepSeek V4 Flash (DeepSeek)"
    factory_provider: generic-chat-completion-api
    upstream_protocol: openai-chat
    known_auth: deepseek
    upstream_model: deepseek-v4-flash
    max_output_tokens: 128000
    max_context_tokens: 64000
    capabilities:
      reasoning: deepseek
    extra_args:
      thinking:
        type: enabled
      reasoning_effort: high

  # Example: Local Ollama, exposed to Droid as generic chat completions.
