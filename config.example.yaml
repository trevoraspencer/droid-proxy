# droid-proxy example configuration.
#
# Setup:
#   cp config.example.yaml config.yaml
#   cp .env.local.example .env.local   # add API keys
#   set -a && source .env.local && set +a
#   ./droid-proxy start --config config.yaml
#
# See docs/CLI.md and docs/README.md for full documentation.

listen:
  host: 127.0.0.1
  port: 8787

server:
  request_body_max_bytes: 10485760
  read_header_timeout: 30s
  read_timeout: 60s
  write_timeout: 600s
  idle_timeout: 120s
  shutdown_timeout: 5s

# Optional: require Droid (or any client) to send a matching API key in
# Authorization. When disabled, localhost is trusted by default.
client_auth:
  enabled: false
  # api_keys:
  #   - "${DROID_PROXY_API_KEY}"

logging:
  level: info
  format: text
  redact: true
  trace_requests: false

reasoning_cache:
  enabled: true
  max_entries: 1024
  ttl: 30m

upstream:
  http_timeout: 600s
  stream_keep_alive: 15s
  response_body_max_bytes: 104857600
  error_body_max_bytes: 1048576

oauth:
  auth_dir: "~/.droid-proxy/auth"
  codex_callback_host: localhost
  codex_callback_port: 1455
  xai_callback_host: 127.0.0.1
  xai_callback_port: 56121

models:
  # Example: DeepSeek via Factory's generic-chat-completion-api mode.
  - alias: deepseek-v4-flash
    display_name: "DeepSeek V4 Flash (DeepSeek)"
    factory_provider: generic-chat-completion-api
    upstream_protocol: openai-chat
    known_auth: deepseek
    upstream_model: deepseek-v4-flash
    max_output_tokens: 8192
    max_context_tokens: 64000
    capabilities:
      reasoning: deepseek

  # Example: Local Ollama, exposed to Droid as generic chat completions.
