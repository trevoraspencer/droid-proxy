# Gitleaks config for droid-proxy pre-public audits.
# Run: gitleaks detect --source . --config .gitleaks.toml --verbose

title = "droid-proxy gitleaks config"

[extend]
# Use gitleaks defaults for rule coverage.
useDefault = true

[allowlist]
description = "Known test sentinels and redaction fixtures — not real credentials."

regexes = [
  '''sk-1234567890abcdef''',
  '''sk-WORKFLOWSECRET123456''',
  '''sk-abc123def456ghi789jkl''',
  '''sk-abcdefghijklmnopqrst''',
  '''sk-CROSS009-[A-Za-z0-9-]+''',
  '''sk-test''',
  '''sentinel-openai-key''',
  '''sentinel-anthropic-key''',
  '''workflow-client-key''',
  '''valid-access-SENTINEL''',
  '''valid-refresh-SENTINEL''',
  '''tok-SENTINEL''',
  '''rt-SENTINEL''',
  '''downstream-secret-123456789''',
  '''encoded%2Fquery%3Dsecret''',
]

paths = [
  '''(?:^|/)internal/.+_test\.go$''',
  '''(?:^|/)internal/logging/redact_test\.go$''',
]
