# droid-proxy user configuration.
#
# Run `droid-proxy config` to add providers, models, API keys, OAuth accounts,
# and Factory Droid settings from the interactive dashboard.

listen:
  host: 127.0.0.1
  port: 9787

server:
  request_body_max_bytes: 10485760
  read_header_timeout: 30s
  read_timeout: 60s
  write_timeout: 600s
  idle_timeout: 120s
  shutdown_timeout: 5s

client_auth:
  enabled: false

logging:
  level: info
  format: text
  redact: true
  trace_requests: false

reasoning_cache:
  enabled: true
  max_entries: 1024
  ttl: 30m

upstream:
  http_timeout: 600s
  stream_keep_alive: 15s
  response_body_max_bytes: 104857600
  error_body_max_bytes: 1048576

oauth:
  auth_dir: "~/.droid-proxy/auth"
  codex_callback_host: localhost
  codex_callback_port: 1455
  xai_callback_host: 127.0.0.1
  xai_callback_port: 56121

models: []
